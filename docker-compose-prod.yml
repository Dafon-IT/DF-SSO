# ============================================================
# DF-SSO Prod 環境 Coolify Compose
#
# ⚠️ 部署前必讀
#
# 1. Seq first-run admin 密碼
#    用 Coolify magic env `$SERVICE_PASSWORD_SEQ` 自動產生。
#    部署後到 Coolify → Resource → Environment Variables 查 `SERVICE_PASSWORD_SEQ`
#    實際值才能登入 Seq UI（帳號：admin）。
#    密碼只在 volume 初次初始化時寫入；之後要改要進 Seq UI 內改，
#    改 env 無效。
#
# 2. Log 架構（v1.1 規範：SDK 直推 CLEF，不再使用 gelf sidecar）
#    Backend 透過 seq-logging SDK → POST http://seq/api/events/raw
#    - compose 網路內直接以 service name `seq` 互連（port 80）
#    - Frontend (Next.js) 目前以 console 輸出走 Docker stdout，已足夠
#    - 若 `SEQ_INGESTION_URL` 未設，backend logger 會 fallback 純 console
#
# 3. Seq volume 殘留損壞
#    多次部署失敗後 `sso-prod-seq-data` 可能殘留半成品，噴
#    `Failed to initialize storage`。到 Coolify UI 砍掉該 volume 再 redeploy。
#
# 4. 此檔「不包含 adminer」— 正式環境禁止對外暴露 DB 管理介面（資安）。
#    需要查資料請走 Test 環境或 SSH 進 container 操作。
# ============================================================

services:
  # ============================================
  # PostgreSQL
  # ============================================
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - sso-postgres-data:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql

  # ============================================
  # Redis
  # ============================================
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    expose:
      - "6379"
    volumes:
      - sso-redis-data:/data

  # ============================================
  # Seq Server（集中式 log UI）
  # ⚠️ 不要對此容器設 healthcheck（datalust/seq 沒裝 curl/wget，會永遠 unhealthy）
  # ============================================
  seq:
    image: datalust/seq:2025.2
    restart: unless-stopped
    expose:
      - "80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINUSERNAME: admin
      SEQ_FIRSTRUN_ADMINPASSWORD: $SERVICE_PASSWORD_SEQ
      SERVICE_URL_SEQ_80:
    volumes:
      - sso-seq-data:/data

  # ============================================
  # SSO Backend (Express.js)
  # log 由應用程式內 seq-logging SDK 直推到 http://seq
  # ============================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    expose:
      - "35890"
    depends_on:
      - postgres
      - redis
      - seq
    environment:
      PORT: 35890
      NODE_ENV: production
      MIGRATIONS_DIR: prod
      FRONTEND_URL: ${FRONTEND_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET}
      AZURE_TENANT_ID: ${AZURE_TENANT_ID}
      AZURE_REDIRECT_URI: ${AZURE_REDIRECT_URI}
      ROPC_REDIRECT_URL: ${ROPC_REDIRECT_URL}
      PG_HOST: postgres
      PG_PORT: 5432
      PG_DATABASE: ${DB_NAME}
      PG_USER: ${DB_USER}
      PG_PASSWORD: ${DB_PASSWORD}
      PG_SCHEMA: public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: ${REDIS_DB}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN}
      ERP_API_LOGIN_URL: ${ERP_API_LOGIN_URL}
      ERP_API_SEARCH_URL: ${ERP_API_SEARCH_URL}
      ERP_API_ACCOUNT: ${ERP_API_ACCOUNT}
      ERP_API_PASSWORD: ${ERP_API_PASSWORD}
      SEQ_INGESTION_URL: http://seq
      APP_NAME: sso-backend-prod
      SERVICE_URL_BACKEND_35890:

  # ============================================
  # SSO Frontend (Next.js)
  # ============================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_AUTH_PATH: ${NEXT_PUBLIC_AUTH_PATH}
    restart: unless-stopped
    expose:
      - "3000"
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      SERVICE_URL_FRONTEND_3000:

  # ============================================
  # Adminer（暫時啟用，資料查完後請移除對外連結）
  # ⚠️ 正式環境原則上不保留此服務，使用後請盡速移除 FQDN 並刪除此 block
  # ============================================
  adminer:
    image: adminer:latest
    restart: unless-stopped
    expose:
      - "8080"
    depends_on:
      - postgres
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DEFAULT_DB_DRIVER: pgsql
      ADMINER_DESIGN: dracula
      SERVICE_URL_ADMINER_8080:

volumes:
  sso-postgres-data:
    name: sso-prod-postgres-data
  sso-redis-data:
    name: sso-prod-redis-data
  sso-seq-data:
    name: sso-prod-seq-data
